<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Tournament Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🔥 FF TOURNAMENT</h1>
  </header>

  <!-- Tournament Card -->
  <section class="container">
    <div class="card">
      <h2>Solo Tournament</h2>
      <p>📍 Bermuda | 💰 Entry ₹25</p>
      <button class="btn">Join Now</button>
    </div>

    <!-- Register Card -->
    <div class="card">
      <h2>Register</h2>
      <input type="text" placeholder="In-game Name">
      <input type="number" placeholder="UID">
      <input type="number" placeholder="WhatsApp Number">
      <button class="btn">Pay & Register</button>
    </div>

    <!-- Players Card -->
    <div class="card">
      <h2>Players</h2>
      <p>No players yet</p>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
